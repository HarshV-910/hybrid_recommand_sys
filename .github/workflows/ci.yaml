name: CI-CD

on: push
    
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:

# basic env creation
      - name: code checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

# requirements installation and testing          

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

# AWS login for S3 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

# dvc data pull and testing app

      - name: DVC pull
        run: dvc pull
      
      - name: Run Application
        run: |
          nohup streamlit run app.py --server.port 8000 & sleep 30
        
      - name: Test App
        run: |
          pytest tests_app.py
      
      - name: Stop Application
        run: |
          pkill -f "streamlit run"

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI || vars.ECR_REPOSITORY_URI }}
        run: |
          REPO_NAME="${ECR_REPOSITORY_URI#*.amazonaws.com/}"

          if [ -z "$REPO_NAME" ] || [ "$REPO_NAME" = "$ECR_REPOSITORY_URI" ]; then
            echo "Invalid ECR_REPOSITORY_URI: '$ECR_REPOSITORY_URI'"
            exit 1
          fi

          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPO_NAME"

      - name: Build, tag and Push Docker Image to ECR
        env:
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI || vars.ECR_REPOSITORY_URI }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REPOSITORY_URI:$IMAGE_TAG .
          docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
