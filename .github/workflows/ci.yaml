name: CI-CD

on: push
    
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:

# basic env creation
      - name: code checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

# requirements installation and testing          

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

# AWS login for S3 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

# dvc data pull and testing app

      - name: DVC pull
        run: dvc pull

      - name: Run Application
        run: |
          nohup streamlit run app.py --server.port 8000 & sleep 30
        
      - name: Test App
        run: |
          pytest tests_app.py
      
      - name: Stop Application
        run: |
          pkill -f "streamlit run"

# AWS login for ECR and pushing docker image
    
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

########################################
      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build, tag and Push Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_URI }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          driver: docker-container  # Fixes the cache export error

